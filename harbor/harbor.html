<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索号潜水艇</title>
    <style>
        /* ==================== CSS变量定义 ==================== */
        :root {
            --primary-color: #87CEEB; /* 主色调：浅蓝色 */
            --glass-bg: rgba(255, 255, 255, 0.3); /* 毛玻璃背景色 */
            --text-color: #ffffff; /* 文字颜色：白色 */
            --shadow: 0 4px 10px rgba(0, 0, 0, 0.2); /* 阴影效果 */
        }

        /* ==================== 全局样式重置 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* ==================== 页面主体样式 ==================== */
        body {
            width: 100vw; /* 视口宽度 */
            height: 100vh; /* 视口高度 */
            overflow: hidden; /* 隐藏溢出内容 */
            position: relative;
            background-color: #000; /* 黑色背景 */
        }

        /* ==================== 开场视频容器样式 ==================== */
        .video-container {
            position: fixed; /* 固定定位 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999; /* 最高层级 */
            background: #000;
            cursor: pointer; /* 点击跳过提示 */
        }

        /* 视频元素样式 */
        #start-video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 覆盖填充 */
        }

        /* 视频隐藏动画类 */
        .video-hide {
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease, visibility 0s 1s;
        }

        /* ==================== 主界面容器样式 ==================== */
        .main-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: none; /* 默认隐藏 */
            opacity: 0;
        }

        /* 主界面显示动画类 */
        .main-show {
            display: block;
            opacity: 1;
            transition: opacity 1s ease;
        }

        /* ==================== 海底背景层样式 ==================== */
        .sea-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* 底层 */
            overflow: hidden;
            background: #000;
        }

        /* 背景滚动容器 */
        .bg-move {
            position: absolute;
            height: 100%;
            width: 800%; /* 8张图片宽度 */
            display: flex;
            left: 0;
        }

        /* 背景图片样式 */
        .bg-move img {
            height: 100%;
            width: 12.5%; /* 每张图片占12.5%（100% / 8） */
            object-fit: cover;
            margin-left: -1.5%; /* 图片重叠实现无缝衔接 */
            /* 渐变遮罩：边缘透明实现自然过渡 */
            -webkit-mask-image: linear-gradient(
                to right,
                transparent 0%, /* 左边缘透明 */
                black 5%, /* 5%处完全不透明 */
                black 95%, /* 95%处完全不透明 */
                transparent 100% /* 右边缘透明 */
            );
            mask-image: linear-gradient(
                to right,
                transparent 0%,
                black 5%,
                black 95%,
                transparent 100%
            );
        }

        /* 第一张图片不偏移 */
        .bg-move img:first-child {
            margin-left: 0;
        }

        /* ==================== 海洋生物层样式 ==================== */
        .fish-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* 居中 */
            width: 55%;
            aspect-ratio: 1/1; /* 1:1比例 */
            z-index: 2;
        }

        /* 鱼类通用样式 - 使用按钮元素 */
        .fish {
            position: absolute;
            width: 80px;
            height: auto;
            cursor: pointer; /* 可点击 */
            transition: transform 0.3s ease, filter 0.3s ease;
            z-index: 5;
            border: none;
            background: transparent;
            padding: 0;
            outline: none;
        }

        /* 鱼类按钮内的图片样式 */
        .fish img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        /* 鱼类悬停效果 */
        .fish:hover img {
            transform: scale(1.2); /* 放大 */
            filter: brightness(1.2) drop-shadow(0 0 10px rgba(255, 255, 255, 0.5)); /* 发光效果 */
        }

        /* 鱼类点击效果 */
        .fish:active img {
            transform: scale(0.95); /* 缩小 */
        }

        /* ==================== 潜水艇窗户遮罩层样式 ==================== */
        .window-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10; /* 高层级 */
            pointer-events: none; /* 不响应鼠标事件 */
        }

        /* 窗户图片样式 */
        #window-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ==================== 标题样式 ==================== */
        .title {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%); /* 水平居中 */
            z-index: 11;
            font-size: 48px;
            color: var(--text-color);
            text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color);
            animation: titleGlow 3s ease-in-out infinite; /* 发光动画 */
            font-weight: bold;
            letter-spacing: 4px; /* 字间距 */
        }

        /* 标题发光动画 */
        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 10px var(--primary-color); }
            50% { text-shadow: 0 0 25px var(--primary-color), 0 0 35px var(--primary-color); }
        }

        /* ==================== 控制按钮样式 ==================== */
        .control-buttons {
            position: absolute;
            bottom: 25%;
            left: 0;
            right: 0;
            z-index: 11;
            display: flex;
            justify-content: space-between;
            padding: 0 5%;
        }

        /* 按钮通用样式 */
        .control-btn {
            width: 70px;
            height: 70px;
            background: rgba(26, 82, 118, 0.8);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        /* 按钮悬停效果 */
        .control-btn:hover {
            transform: scale(1.15);
            background: rgba(26, 82, 118, 0.95);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
        }

        /* 按钮按下效果 */
        .control-btn:active {
            transform: scale(1.05);
        }

        /* 箭头图标样式 */
        .control-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        /* ==================== AI悬浮助手样式 ==================== */
        .ai-float {
            position: fixed;
            right: 30px;
            top: 50%;
            z-index: 100;
            width: 60px;
            height: 60px;
            cursor: grab; /* 可拖动 */
            user-select: none; /* 禁止选中 */
        }

        /* 拖动时的光标 */
        .ai-float.dragging {
            cursor: grabbing;
        }

        /* AI球体样式 */
        .ai-ball {
            width: 100%;
            height: 100%;
            background: var(--primary-color);
            border-radius: 50%; /* 圆形 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: var(--shadow);
            animation: breathe 2s ease-in-out infinite; /* 呼吸动画 */
            pointer-events: none;
        }

        /* 拖动时球体效果 */
        .ai-float.dragging .ai-ball {
            animation: none;
            transform: scale(1.1);
        }

        /* 呼吸动画 */
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        /* AI聊天窗口样式 */
        .ai-chat {
            position: fixed;
            width: 320px;
            height: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px); /* 毛玻璃效果 */
            border-radius: 20px;
            box-shadow: var(--shadow);
            z-index: 101;
            display: none; /* 默认隐藏 */
            flex-direction: column;
            overflow: hidden;
        }

        /* 聊天窗口显示类 */
        .ai-chat.show {
            display: flex;
        }

        /* 聊天头部样式 */
        .chat-header {
            padding: 15px;
            background: var(--primary-color);
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        /* 聊天内容区域样式 */
        .chat-content {
            flex: 1; /* 占据剩余空间 */
            padding: 15px;
            overflow-y: auto; /* 垂直滚动 */
            color: #333;
        }

        /* 消息气泡样式 */
        .message {
            background: white;
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            max-width: 80%;
        }

        /* 聊天输入区域样式 */
        .chat-input {
            display: flex;
            padding: 10px;
            background: white;
        }

        /* 输入框样式 */
        #chat-input-text {
            flex: 1;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 20px;
            outline: none;
        }

        /* 发送按钮样式 */
        #send-btn {
            margin-left: 10px;
            padding: 10px 20px;
            background: var(--primary-color);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        /* ==================== 鱼类对话框样式 ==================== */
        .fish-dialog {
            position: fixed;
            background: linear-gradient(135deg, #ffffff 0%, #f0f8ff 100%);
            border-radius: 20px;
            padding: 0;
            width: 1100px;
            max-height: 100vh;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.25), 0 5px 15px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            animation: fishDialogShow 0.3s ease;
            pointer-events: auto;
            overflow: hidden;
            border: 2px solid rgba(135, 206, 235, 0.4);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        /* 鱼类对话框显示动画 */
        @keyframes fishDialogShow {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* 鱼类对话框隐藏动画 */
        .fish-dialog-hide {
            animation: fishDialogHide 0.3s ease forwards;
        }

        @keyframes fishDialogHide {
            from {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            to {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
        }

        /* 对话框头部 */
        .fish-dialog-header {
            background: linear-gradient(135deg, #1a5276 0%, #2980b9 50%, #3498db 100%);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* 图鉴图标 */
        .fish-dialog-icon {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        /* 名称容器 */
        .fish-dialog-names {
            flex: 1;
        }

        /* 鱼类中文名称 */
        .fish-dialog-name {
            font-weight: bold;
            font-size: 22px;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        /* 鱼类英文名称 */
        .fish-dialog-english {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        /* 鱼类学名 */
        .fish-dialog-scientific {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
            margin-top: 2px;
        }

        /* 对话框内容区域 */
        .fish-dialog-content {
            position: relative;
            display: block;
            padding: 25px;
            overflow-y: auto;
            max-height: 70vh;
        }

        /* 左侧文字区域 */
        .fish-dialog-text {
            width: 100%;
            padding-right: 450px; /* 为右上角图片留出空间 */
        }

        /* 信息标签 */
        .fish-dialog-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .fish-dialog-tag {
            background: linear-gradient(135deg, #e8f4fd 0%, #d6eaf8 100%);
            color: #1a5276;
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: 600;
            border: 1px solid #b8d4e8;
        }

        /* 信息网格 */
        .fish-dialog-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
            padding: 15px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e8f4fd 100%);
            border-radius: 10px;
        }

        /* 信息项 */
        .fish-dialog-info {
            padding: 0;
        }

        .fish-dialog-info-label {
            font-size: 12px;
            color: #888;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .fish-dialog-info-value {
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }

        /* 鱼类描述样式 */
        .fish-dialog-desc {
            font-size: 15px;
            color: #444;
            line-height: 1.8;
            text-align: justify;
        }

        /* 右上角图片区域 - 绝对定位 */
        .fish-dialog-image {
            position: absolute;
            top: 25px;
            right: 25px;
            max-width: 400px;
            max-height: 500px;
            overflow: hidden;
            border-radius: 15px;
            background: #f8f9fa;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fish-dialog-image img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain; /* 按原比例显示，不裁剪 */
        }

        /* 底部信息栏 */
        .fish-dialog-footer {
            background: linear-gradient(90deg, #f8f9fa 0%, #e8f4fd 100%);
            padding: 12px 25px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fish-dialog-status {
            font-size: 12px;
            color: #666;
        }

        .fish-dialog-status span {
            color: #e74c3c;
            font-weight: bold;
        }

        /* 关闭按钮 */
        .fish-dialog-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
            z-index: 10;
        }

        .fish-dialog-close:hover {
            background: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>

            <button class="control-btn" id="nextBtn" title="前进">

    <script>
        /* ==================== DOM 元素获取 ==================== */
        const videoContainer = document.getElementById('videoContainer'); // 视频容器
        const startVideo = document.getElementById('start-video'); // 开场视频
        const bgMusic = document.getElementById('bg-music'); // 背景音乐
        const mainContainer = document.getElementById('mainContainer'); // 主界面容器
        const bgMove = document.getElementById('bgMove'); // 背景滚动容器
        const prevBtn = document.getElementById('prevBtn'); // 后退按钮
        const nextBtn = document.getElementById('nextBtn'); // 前进按钮
        const aiFloat = document.querySelector('.ai-float'); // AI悬浮球
        const aiBall = document.getElementById('aiBall'); // AI球体
        const aiChat = document.getElementById('aiChat'); // AI聊天窗口
        const sendBtn = document.getElementById('send-btn'); // 发送按钮
        const chatInput = document.getElementById('chat-input-text'); // 聊天输入框
        const chatContent = document.getElementById('chatContent'); // 聊天内容区

        /* ==================== 滚动控制变量 ==================== */
        let scrollPosition = 0; // 当前滚动位置（百分比），0表示初始位置
        const scrollSpeed = 0.05; // 滚动速度：每次动画帧移动的百分比
        let scrollDirection = 0; // 滚动方向：1向右滚动，-1向左滚动，0不滚动
        let isScrolling = false; // 是否正在滚动中
        let animationId = null; // requestAnimationFrame返回的动画ID，用于取消动画
        const totalImages = 24; // 图片总数量
        const imageWidth = 4.167; // 每张图片宽度（100% / 24 ≈ 4.167%）
        const resetThreshold = -100; // 重置阈值

        /* ==================== 海洋生物管理 ==================== */
        const fishContainer = document.getElementById('fishContainer');
        
        // 海洋生物数据 - 共32种海洋生物
        const fishTypes = [
            { 
                src: 'image/大白鲨.png',
                dialogImage: 'image/大白鲨.jpg',
                name: '大白鲨',
                englishName: 'Great White Shark',
                scientific: 'Carcharodon carcharias',
                icon: '🦈',
                width: 250,
                speed: 0.07,
                tags: ['软骨鱼类', '顶级掠食者', '易危物种'],
                habitat: '全球温带和热带海域，偏好沿海水域',
                diet: '鱼类、海豹、海狮、海豚等海洋哺乳动物',

        // 活跃的海洋生物列表
        let activeFish = [];
        
        // 初始化海洋生物
        function initFish() {
            // 初始生成 15 条鱼（普通位置 20%-70%）
            for (let i = 0; i < 15; i++) {
                createFish(true);
            }
            // 底部固定生物只在背景滚动时从右侧边缘生成
        }
        
        // 创建一条海洋生物（支持成群生成）
        // @param {boolean} fromEdge - 是否从边缘生成
        function createFish(fromEdge = false) {
            const fishType = fishTypes[Math.floor(Math.random() * fishTypes.length)];
            
            // 确定群组大小
            let groupCount = 1;
            if (fishType.groupSize) {
                const [min, max] = fishType.groupSize;
                groupCount = min + Math.floor(Math.random() * (max - min + 1));
            }
            
            // 生成群组中的所有生物
            for (let g = 0; g < groupCount; g++) {
                // 创建按钮元素
                const fish = document.createElement('button');
                fish.className = 'fish';
                fish.type = 'button';
                
                // 创建图片元素
                const img = document.createElement('img');
                img.src = fishType.src;
                img.alt = fishType.name;
                fish.appendChild(img);
                
                // 随机大小浮动（±20%），使体型不完全相同
                const sizeVariation = 0.8 + Math.random() * 0.4; // 0.8~1.2
                const finalWidth = Math.round(fishType.width * sizeVariation);
                fish.style.width = finalWidth + 'px';
                
                // 随机垂直位置（20% - 70%）
                const top = 20 + Math.random() * 50;
                fish.style.top = top + '%';
                
                // 水平位置
                let left;
                if (fromEdge) {
                    // 从边缘生成：第一个在边缘，群组内相邻
                    if (g === 0) {
                        const direction = Math.random() > 0.5 ? 1 : -1;
                        left = direction === 1 ? -15 : 105;
                    } else {
                        left = parseFloat(fishContainer.lastElementChild.style.left) + (Math.random() - 0.5) * 10;
                    }
                } else {
                    // 随机位置：群组内相邻
                    if (g === 0) {
                        left = 10 + Math.random() * 80;
                    } else {
                        left = parseFloat(fishContainer.lastElementChild.style.left) + (Math.random() - 0.5) * 10;
                    }
                }
                fish.style.left = left + '%';
                
                // 随机移动方向
                // 如果 speed 为 0，则不移动（direction 设为 0）
                const direction = fishType.speed === 0 ? 0 : (Math.random() > 0.5 ? 1 : -1);
                // 基于生物自身 speed 属性，添加±10% 的小浮动，使同种生物速度相近
                const baseSpeed = fishType.speed || 0.2;
                const speedVariation = 0.9 + Math.random() * 0.2; // 0.9~1.1
                const speed = baseSpeed * speedVariation;
                fish.dataset.direction = direction;
                fish.dataset.speed = speed;
                
                // 根据方向设置图片翻转：向左移动 (-1) 为原图，向右移动 (1) 为镜像
                if (direction === 1) {
                    img.style.transform = 'scaleX(-1)';
                }
                
                // 添加鼠标悬停事件：悬停时停止移动
                fish.addEventListener('mouseenter', () => {
                    fish.dataset.hover = 'true';
                });
                fish.addEventListener('mouseleave', () => {
                    fish.dataset.hover = 'false';
                });
                
                // 添加点击事件
                fish.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showFishDialog(fish, fishType);
                });
                
                fishContainer.appendChild(fish);
                activeFish.push(fish);
            }
        }
        
        // 创建底部固定海洋生物
        function createBottomFish(fishType) {
            // 确定群组大小
            let groupCount = 1;
            if (fishType.groupSize) {
                const [min, max] = fishType.groupSize;

        /* ==================== 背景滚动动画 ==================== */
        /**
         * 滚动动画函数
         * 使用requestAnimationFrame实现平滑动画
         * 通过图片循环实现无缝轮播，不需要跳转
         */
        function animateScroll() {
            // 如果不在滚动状态，直接返回
            if (!isScrolling) return;
            
            // 根据方向更新滚动位置
            // scrollDirection为正时向右滚动（scrollPosition增加）
            // scrollDirection为负时向左滚动（scrollPosition减少）
            scrollPosition += scrollDirection * scrollSpeed;
            
            // 无缝循环：当滚动到重置阈值时，重置位置到起点
            // 由于图片是循环排列的，重置后视觉上完全连续
            if (scrollPosition < resetThreshold) {
                scrollPosition += 100; // 重置到等效位置
            } else if (scrollPosition > 0) {
                scrollPosition -= 100; // 重置到等效位置
            }
            
            // 应用CSS transform实现位移
            bgMove.style.transform = `translateX(${scrollPosition}%)`;
            
            // 更新海洋生物位置
            updateFishPosition();
            
            // 继续下一帧动画
            animationId = requestAnimationFrame(animateScroll);
        }

        /**
         * 开始滚动
         * @param {number} direction - 滚动方向：1向右滚动，-1向左滚动
         */
        function startScroll(direction) {
            // 如果已经在滚动，不重复启动
            if (isScrolling) return;
            
            // 设置滚动方向
            scrollDirection = direction;
            // 标记为滚动状态
            isScrolling = true;
            // 启动动画循环
            animationId = requestAnimationFrame(animateScroll);
        }

        /**
         * 停止滚动
         * 用户松开按钮时调用，可以停在任意位置
         */
        function stopScroll() {
            // 标记为停止滚动状态
            isScrolling = false;
            // 重置滚动方向
            scrollDirection = 0;
            
            // 取消动画帧，释放资源
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }

        // ==================== 前进按钮事件绑定 ====================
        // 按下鼠标时开始向左滚动（背景向左移动，看到右侧新内容）
        nextBtn.addEventListener('mousedown', () => startScroll(-1));
        // 松开鼠标时停止滚动，可以停在任意位置
        nextBtn.addEventListener('mouseup', stopScroll);
        // 鼠标离开按钮时也停止滚动
        nextBtn.addEventListener('mouseleave', stopScroll);
        // 触摸设备支持：触摸开始时滚动
        nextBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // 阻止默认行为，防止触发mouse事件
            startScroll(-1);
        });
        // 触摸结束时停止滚动
        nextBtn.addEventListener('touchend', stopScroll);

        // ==================== 后退按钮事件绑定 ====================
        // 按下鼠标时开始向右滚动（背景向右移动，看到左侧新内容）
        prevBtn.addEventListener('mousedown', () => startScroll(1));
        // 松开鼠标时停止滚动，可以停在任意位置
        prevBtn.addEventListener('mouseup', stopScroll);
        // 鼠标离开按钮时也停止滚动

        // 触摸设备支持：触摸开始时滚动

            startScroll(1);
        });
        // 触摸结束时停止滚动
        prevBtn.addEventListener('touchend', stopScroll);

        /* ==================== AI悬浮球拖动功能 ==================== */
        let isDragging = false; // 是否正在拖动
        let dragOffsetX = 0; // 拖动X偏移量
        let dragOffsetY = 0; // 拖动Y偏移量
        let hasMoved = false; // 是否发生了移动

        // 绑定拖动事件
        aiFloat.addEventListener('mousedown', startDrag);
        aiFloat.addEventListener('touchstart', startDrag, { passive: false });

        // 阻止AI对话框内的点击事件冒泡，防止关闭对话框
        aiChat.addEventListener('mousedown', (e) => e.stopPropagation());
        aiChat.addEventListener('touchstart', (e) => e.stopPropagation());
        // 让输入框可以获得焦点
        aiChat.addEventListener('click', (e) => e.stopPropagation());

        /**
         * 开始拖动
         * @param {Event} e - 鼠标或触摸事件
         */
        function startDrag(e) {
            isDragging = true;
            hasMoved = false;
            aiFloat.classList.add('dragging');
            
            // 获取触摸或鼠标位置
            const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            const rect = aiFloat.getBoundingClientRect();
            
            // 计算偏移量
            dragOffsetX = clientX - rect.left;
            dragOffsetY = clientY - rect.top;
            
            if (e.type === 'touchstart') {
                e.preventDefault();
            }
        }

        // 绑定移动事件
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });

        /**
         * 拖动中
         * @param {Event} e - 鼠标或触摸事件
         */
        function drag(e) {
            if (!isDragging) return;
            
            // 获取触摸或鼠标位置
            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            
            // 计算新位置
            const newX = clientX - dragOffsetX;
            const newY = clientY - dragOffsetY;
            
            // 检测是否发生了移动
            if (Math.abs(newX - parseFloat(aiFloat.style.left || 0)) > 5 || 
                Math.abs(newY - parseFloat(aiFloat.style.top || 0)) > 5) {
                hasMoved = true;
                // 移动时关闭聊天窗口
                if (aiChat.classList.contains('show')) {
                    aiChat.classList.remove('show');
                }
            }
            
            // 更新位置
            aiFloat.style.right = 'auto';
            aiFloat.style.left = newX + 'px';
            aiFloat.style.top = newY + 'px';
            
            if (e.type === 'touchmove') {
                e.preventDefault();
            }
        }

        // 绑定结束拖动事件
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);

        /**
         * 结束拖动
         */
        function endDrag() {
            if (isDragging) {
                isDragging = false;
                aiFloat.classList.remove('dragging');
                
                // 如果没有移动，则切换聊天窗口
                if (!hasMoved) {
                    toggleChat();
                }
            }
        }

        /**
         * 切换聊天窗口显示状态
         */
        function toggleChat() {
            const isShowing = aiChat.classList.toggle('show');
            if (isShowing) {
                updateChatPosition();
            }
        }

        /**
         * 更新聊天窗口位置
         * 根据悬浮球位置自动调整，确保完全可见
         */
        function updateChatPosition() {
            const floatRect = aiFloat.getBoundingClientRect();
            const chatWidth = 320;
            const chatHeight = 450;
            const margin = 15;
            
            let left, top;
            
            // 水平位置：悬浮球在右侧时窗口显示在左边，反之亦然
            if (floatRect.left > window.innerWidth / 2) {
                left = floatRect.left - chatWidth - margin;
            } else {
                left = floatRect.right + margin;
            }
            
            // 边界检测：确保窗口不超出屏幕
            if (left < 0) {
                left = margin;
            } else if (left + chatWidth > window.innerWidth) {
                left = window.innerWidth - chatWidth - margin;
            }
            
            // 垂直位置：居中对齐
            top = floatRect.top + (floatRect.height / 2) - (chatHeight / 2);
            
            // 边界检测：确保窗口不超出屏幕
            if (top < margin) {
                top = margin;
            } else if (top + chatHeight > window.innerHeight) {
                top = window.innerHeight - chatHeight - margin;
            }
            
            // 应用位置
            aiChat.style.left = left + 'px';
            aiChat.style.top = top + 'px';
        }

        // 当前显示的鱼类对话框
        let currentFishDialog = null;

        // 点击页面其他地方关闭鱼类对话框
        document.addEventListener('click', () => {
            if (currentFishDialog) {
                currentFishDialog.remove();
                currentFishDialog = null;
            }
        });

        // 页面加载完成后初始化海洋生物
        initFish();
        
        // 启动海洋生物移动动画循环（独立于滚动动画）
        function fishAnimationLoop() {
            // 只有在不滚动时才更新自身移动
            if (!isScrolling) {
                updateFishPosition();
            }
            requestAnimationFrame(fishAnimationLoop);
        }
        fishAnimationLoop();

        /* ==================== 聊天功能 ==================== */
        // 聊天记录数组（用于上下文对话）
        let chatHistory = [];
        
        // 发送按钮点击事件
        sendBtn.addEventListener('click', sendMessage);
        // 输入框回车发送
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        /**
         * 发送消息 + 调用本地Ollama AI（支持聊天记录）
         */
        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            
            // 用户消息
            const userMsg = document.createElement('div');
            userMsg.className = 'message';
            userMsg.style.marginLeft = 'auto';
            userMsg.style.background = '#d1e7ff';
            userMsg.textContent = text;
            chatContent.appendChild(userMsg);
            chatInput.value = '';
            chatContent.scrollTop = chatContent.scrollHeight;

            // AI 回复中...
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message';
            loadingMsg.textContent = '思考中...🐳';
            chatContent.appendChild(loadingMsg);
            chatContent.scrollTop = chatContent.scrollHeight;

            try {
                // 将用户消息添加到历史记录
                chatHistory.push({ role: "user", content: text });
                
                // 限制聊天记录长度（只保留最近 10 条，避免 token 过多）
                if (chatHistory.length > 10) {
                    chatHistory = chatHistory.slice(-10);
                }

                const res = await fetch('http://localhost:11434/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "qwen2.5:7b",
                        messages: [
                            {
                                role: "system",
                                content: "你是儿童海洋生物科普专家'海洋小博士'。请用以下方式和小朋友交流：1. 语言风格：简单可爱、通俗易懂、生动有趣，使用拟人化表达；2. 内容特点：用'你好呀''嗨'等亲切问候，多用感叹号和表情符号（🐬🐠🌊）介绍有趣的习性和特点，避免枯燥数据；3. 安全原则：不提及危险、血腥、死亡等内容，强调保护海洋、爱护生物，传递积极向上的价值观；4. 科普使命：激发儿童对海洋的兴趣，培养环保意识和生态观念，用故事化方式传递知识。5、小朋友和你说生物名是要你解释，不是让你扮演这个生物和他对话 6、回答长度：每次 4-5 句话，简短精炼，适合儿童注意力；7、强调动物的危险性，不要误导小朋友踏入危险，"
                            },
                            ...chatHistory  // 包含聊天记录
                        ],
                        stream: false
                    })
                });

                const data = await res.json();
                const aiText = data.message.content;

                // 将 AI 回复添加到历史记录
                chatHistory.push({ role: "assistant", content: aiText });

                // 移除加载中，显示 AI 回答
                loadingMsg.remove();
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message';
                aiMsg.textContent = aiText;
                chatContent.appendChild(aiMsg);
                chatContent.scrollTop = chatContent.scrollHeight;

            } catch (err) {
                loadingMsg.remove();
                const errMsg = document.createElement('div');
                errMsg.className = 'message';
                errMsg.textContent = '连接 AI 失败，请确保 Ollama 已启动';
                chatContent.appendChild(errMsg);
                chatContent.scrollTop = chatContent.scrollHeight;
            }
        }
    </script>
</body>
</html>
